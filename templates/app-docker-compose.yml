services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "${APP_PORT:-3000}"
    expose:
      - "${APP_PORT:-3000}"
    ports:
      - "${HOST_PORT:-3000}:${APP_PORT:-3000}"
    networks:
      web:
        aliases:
          - "${APP_NAME}"

networks:
  web:
    external: true
